server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # === BLOCK MALICIOUS PATHS ===
    
    # Block common exploit paths
    location ~* (\.env|\.git|\.htaccess|\.bak|\.config|\.sql|\.log|\.tar|\.zip|phpmyadmin|wp-admin|admin|mysql|pma) {
        return 444;
    }

    # Block suspicious paths
    location ~* (\.rsp|\.jsp|\.asp|\.aspx|\.cgi|\.pl|\.py|\.sh) {
        return 444;
    }

    # Block WAF patterns (cmd, shell, exec, etc.)
    location ~* (cmd|shell|exec|eval|base64|passthru|system|popen|proc_open) {
        return 444;
    }

    # Block SQL injection patterns
    location ~* (union|select|insert|update|delete|drop|create|alter|exec|script) {
        return 444;
    }

    # Block XSS patterns
    location ~* (<script|javascript:|onerror=|onload=) {
        return 444;
    }

    # Block known malicious request patterns
    if ($query_string ~* "wget|curl|rm |chmod|mkfs") {
        return 444;
    }

    # Block suspicious user agents
    if ($http_user_agent ~* (masscan|shodan|censys|securityscan|nmap|masscan|sqlmap|nikto|hydra|metasploit|burp|scanner)) {
        return 444;
    }

    # Block empty user agent or known bots without proper identification
    if ($http_user_agent ~* "^$|^Mozilla/[0-9]\.[0-9]$|^Mozila/|^Mozila/") {
        return 444;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        limit_req zone=general burst=50 nodelay;
    }

    # Backend API proxy with rate limiting
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health check proxy
    location /health {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    # SPA fallback - all routes go to index.html
    location / {
        limit_req zone=general burst=100 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
