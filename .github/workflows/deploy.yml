name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/giangkh1908/find-job/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/giangkh1908/find-job/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/giangkh1908/find-job/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/giangkh1908/find-job/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_SHA
          script: |
            cd /home/deploy/app

            # Pull latest code from git
            echo "Pulling latest code..."
            git pull origin main

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Restart services
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Cleanup old Docker images (keep only 2 most recent tagged images)
            echo "Before cleanup:"
            docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}\t{{.CreatedAt}}"

            echo "Cleaning up old images..."
            
            # Remove dangling images (untagged)
            docker image prune -f
            
            # Remove old tagged images except latest and previous sha
            docker images --format '{{.Repository}}:{{.Tag}}' | \
              grep -E 'giangkh1908/find-job-(backend|frontend):' | \
              grep -v ':latest' | \
              head -n -4 | \
              xargs -r docker rmi 2>/dev/null || true

            echo "After cleanup:"
            docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
            
            # Show disk space reclaimed
            docker system df

            echo "Deployed: ${{ env.GITHUB_SHA }}"
